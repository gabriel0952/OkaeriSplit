name: app
description: "OkaeriSplit - 群組分帳 App"
publish_to: 'none'
version: 1.8.2+16

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  fpdart: ^1.2.0
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  json_annotation: ^4.10.0
  fl_chart: ^0.70.2
  image_picker: ^1.1.2
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.3
  flutter_web_auth_2: ^4.0.0
  supabase_flutter: ^2.12.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.1.4
  home_widget: ^0.7.0
  app_links: ^6.4.1
  share_plus: ^10.0.3
  google_mlkit_text_recognition: ^0.15.1
  path_provider: ^2.1.4
  image: ^4.2.0
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  build_runner: ^2.11.1
  json_serializable: ^6.12.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
